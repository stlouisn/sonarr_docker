version: '2.4'

services:

  sonarr:
    image: stlouisn/sonarr
    container_name: sonarr
    hostname: sonarr
    environment:
      - LC_ALL=C.UTF-8
      - TZ=UTC
    restart: always
    volumes:
      - /docker/sonarr/config:/var/lib/sonarr:rw
      - /media/downloads:/downloads:rw
      - /media/tvshows:/tv:rw
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - 8989
